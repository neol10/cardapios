<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cardápio Digital">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a00" />
      <stop offset="1" stop-color="#c8945b" />
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="#0f0d0b" />

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="190" fill="url(#g)" opacity="0.95" />
    <circle cx="256" cy="256" r="190" fill="url(#glow)" />
  </g>

  <g>
    <rect x="152" y="170" width="208" height="40" rx="20" fill="#0f0d0b" opacity="0.92" />
    <rect x="152" y="236" width="208" height="40" rx="20" fill="#0f0d0b" opacity="0.86" />
    <rect x="152" y="302" width="160" height="40" rx="20" fill="#0f0d0b" opacity="0.8" />
  </g>
</svg>
