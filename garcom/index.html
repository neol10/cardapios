  <body class="is-loading">
    <header class="hero">
      <div class="hero-content">
        <div>
          <p class="chip">Bloco de Notas do Garçom</p>
          <h1 id="cardapio-nome">Carregando cardápio...</h1>
          <p id="cardapio-subtitle">Anote pedidos rapidamente por mesa.</p>
        </div>
        <div class="hero-media">
          <img id="cardapio-foto" class="is-hidden" alt="" />
        </div>
      </div>
    </header>

    <main class="content-grid">
      <section>
        <!-- Mesa atual -->
        <div class="mesa-selector">
          <label>
            Número da Mesa
            <input type="number" id="numero-mesa" min="1" max="999" placeholder="Ex: 1" />
          </label>
          <button id="nova-mesa-btn" class="btn btn-secondary">Nova Mesa</button>
        </div>

        <!-- Produtos -->
        <div id="produtos" class="produtos-grid">
          <p class="muted">Carregando produtos...</p>
        </div>
      </section>

      <!-- Pedidos da mesa atual -->
      <aside class="pedidos-box">
        <h2>Pedidos da Mesa <span id="mesa-atual">-</span></h2>
        <div id="pedidos-mesa" class="pedidos-mesa">
          <p class="muted">Selecione uma mesa ou adicione produtos.</p>
        </div>
        
        <div class="mesa-actions">
          <button id="limpar-mesa-btn" class="btn btn-ghost">Limpar Mesa</button>
          <button id="finalizar-mesa-btn" class="btn btn-primary">Finalizar Mesa</button>
        </div>

        <!-- Lista de mesas -->
        <details class="details" id="mesas-abertas">
          <summary>Mesas Abertas (<span id="count-mesas">0</span>)</summary>
          <div id="lista-mesas" class="mesas-list">
            <p class="muted">Nenhuma mesa aberta.</p>
          </div>
        </details>
      </aside>
    </main>
