<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Administrativo | L'Épicurien</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            font-family: 'Manrope', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Container do Login -->
<main class="w-full max-w-md">
<!-- Header / Logo -->
<div class="text-center mb-10">
<div class="mb-6 inline-block">
<div class="w-20 h-20 bg-surface-container-low rounded-xl flex items-center justify-center mx-auto shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="restaurant_menu">restaurant_menu</span>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-primary">L'Épicurien</h1>
<p class="text-on-surface-variant font-label text-sm mt-2 tracking-wide">PAINEL ADMINISTRATIVO</p>
</div>
<!-- Card de Login -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-lg shadow-sm">
<h2 class="text-xl font-bold mb-8 text-on-surface">Acesse sua conta</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Campo de E-mail -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Endereço de Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-high border-none rounded-sm text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all" id="email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Campo de Senha -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Senha de Acesso</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-high border-none rounded-sm text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Esqueci minha senha link -->
<div class="flex justify-end">
<a class="text-sm font-label font-semibold text-primary hover:text-primary-dim transition-colors" href="#">
                        Esqueci minha senha
                    </a>
</div>
<!-- Botão Entrar -->
<button class="w-full py-4 bg-primary text-on-primary font-bold rounded-lg shadow-sm hover:bg-primary-dim active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Ilustração Discreta Contextual -->
<div class="mt-12 opacity-10 flex justify-center">
<div class="grid grid-cols-3 gap-8">
<span class="material-symbols-outlined text-4xl" data-icon="skillet">skillet</span>
<span class="material-symbols-outlined text-4xl" data-icon="outdoor_grill">outdoor_grill</span>
<span class="material-symbols-outlined text-4xl" data-icon="oven_gen">oven_gen</span>
</div>
</div>
<!-- Rodapé -->
<footer class="mt-12 text-center">
<p class="text-outline text-xs font-label uppercase tracking-[0.2em] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
                Acesso restrito ao proprietário
            </p>
<div class="mt-8 flex justify-center gap-6 opacity-30 grayscale pointer-events-none">
<img alt="Parceiro Institucional 1" class="h-6 object-contain" data-alt="minimalist silhouette logo of a gourmet association in monochrome light grey" src="https://lh3.googleusercontent.com/aida-public/AB6AXuASTLhwOQDKgB3HTPnCQOsIRYDgJEZ63tyD7pn5x8yQPVcIJ-5pqFy21ftG3Xs3jBg3Dszqvob-9wMlk2v-SsX14phA57QklpLNyS0XDIcE-d_nl2TzOvFVcC-NgWq1cIviw8ZBzEOJWKo0wS_tqN22nJeGh-cCi0etYTVIinzV8QT6mDCF4xBvaEx2-JEMxVgXaSNlu8FfaSXbLjiKoiE1HyIN6kzmpvKuRz7mFBJvNgfS1ttC1EsDQ8SRV7oMZQynmsR5fgExDhV5"/>
<img alt="Parceiro Institucional 2" class="h-6 object-contain" data-alt="minimalist silhouette logo of a culinary certification board in monochrome light grey" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCC71hULdUgO5m5GTs1C9HKfbS2jK6pTmTQZXR0AItYoDYDFve6WFp9QZ_0-x_5cAbymfz126V6aQApkVjs8xfU4JNMXDYa4boUsX_oGOCMTqSc5p3B-lHfdHuJEYnH90xeWEJxHdvQqdCQpH-RXpRk_lqzSswoYOdxXKt_b-xCZAEKC9jqg5eYLUIJfpv2uCAjVnATAKBNdZTrW_OOCG-T2C8Q4aauhoz-R414k5k91-Lj3hDCLlPvNu53iP_RbQRS2nBTX1_L6iVd"/>
</div>
</footer>
</main>
<!-- Background Decoration (Asymmetric Editorial Style) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[5%] right-[2%] w-[30%] h-[30%] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
