  <body class="admin-body">
    <main class="auth-layout">
      <section class="auth-card">
        <h1>Painel do Cardápio</h1>
        <p>Acesse para gerenciar cardápios, produtos e pedidos.</p>

        <form id="login-form" class="stack-gap">
          <label>
            E-mail
            <input
              type="email"
              name="email"
              placeholder="admin@empresa.com"
              required
              autocomplete="email"
            />
          </label>

          <label>
            Senha
            <input
              type="password"
              name="password"
              placeholder="Sua senha"
              required
              autocomplete="current-password"
            />
          </label>

          <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
        </form>

        <small class="hint"
          >Dica: salve a configuração do Supabase no navegador com:
          localStorage.setItem('supabase.config', JSON.stringify({"url":"...","anonKey":"..."}))</small
        >

        <p id="auth-message" class="message" aria-live="polite"></p>
        <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
      </section>
    </main>
    <script type="module" src="/admin/script.js?v=7"></script>
