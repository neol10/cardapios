  <body class="admin-body">
    <main class="auth-layout" id="owner-page">
      <section class="auth-card">
        <h1>Editar Cardápio</h1>
        <p id="owner-subtitle">Acesse com o PIN do proprietário para editar cardápio, imagens e produtos.</p>

        <form id="owner-auth-form" class="stack-gap">
          <label>
            PIN
            <input type="password" name="pin" inputmode="numeric" autocomplete="one-time-code" required />
          </label>
          <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
        </form>

        <form id="owner-edit-form" class="stack-gap is-hidden">
          <input type="hidden" name="slug" />

          <label>
            Nome
            <input type="text" name="nome" required />
          </label>

          <label>
            WhatsApp (somente números)
            <input type="text" name="whatsapp" required />
          </label>

          <label>
            Slogan
            <div style="display:flex; gap:8px;">
              <input type="text" name="slogan" style="flex:1;" />
              <button type="button" class="btn js-open-templates" title="Modelos de texto">📝</button>
            </div>
            <input type="hidden" name="templates_json" />
          </label>

          <label>
            Tipo de cardápio
            <select name="modo">
              <option value="pedido">Com sistema de pedidos</option>
              <option value="catalogo">Apenas catálogo (sem pedidos)</option>
            </select>
          </label>

          <label id="modo-garcom-wrap">
            <input type="checkbox" name="modo_garcom_enabled" />
            Habilitar modo garçom (funciona em pedido e catálogo)
          </label>

          <label>
            Horário (texto)
            <input type="text" name="horario_funcionamento" placeholder="Ex.: Seg-Sex 18h às 23h" />
          </label>

          <div class="two-cols">
            <label>
              Abre às
              <input type="time" name="abre_em" />
            </label>
            <label>
              Fecha às
              <input type="time" name="fecha_em" />
            </label>
          </div>

          <label>
            Endereço
            <input type="text" name="endereco" />
          </label>

          <label>
            Instagram (URL)
            <input type="url" name="instagram_url" placeholder="https://instagram.com/sua_loja" />
          </label>

          <details class="details details-sub">
            <summary>Imagens do cardápio</summary>

            <label>
              Foto do cardápio (URL)
              <input type="url" name="foto_url" placeholder="https://..." />
            </label>

            <label>
              Banner do cardápio (URL)
              <input type="url" name="banner_url" placeholder="https://..." />
            </label>
          <details class="details details-sub">
            <summary>Configurações de Marmita</summary>
            <label>
              <input type="checkbox" name="modo_marmita_enabled" />
              Ativar Modo Marmita
            </label>
            <label>
              <input type="checkbox" name="marmita_agendamento_enabled" />
              Habilitar agendamento
            </label>
            <label>
              Horário limite (Hoje)
              <input type="time" name="marmita_deadline" />
            </label>
            <label>
              Dias da semana (1-7)
              <input type="text" name="marmita_dias_semana" placeholder="1,2,3,4,5" />
            </label>
            <label>
              Horários de retirada
              <input type="text" name="marmita_horarios_retirada" placeholder="11:30, 12:00, 12:30" />
            </label>
          </details>
        </details>

          <button type="submit" class="btn btn-primary btn-lg">Salvar</button>
          <button type="button" class="btn" id="owner-logout">Sair</button>
        </form>

        <details class="details details-sub is-hidden" id="owner-produtos-section" open>
          <summary>Produtos</summary>

          <div id="owner-produtos-list" class="list">
            <p class="muted">Nenhum produto carregado ainda.</p>
          </div>

          <form id="owner-produto-form" class="stack-gap">
            <input type="hidden" name="id" />

            <label>
              Nome do produto
              <input type="text" name="nome" required />
            </label>

            <div class="two-cols">
              <label>
                Categoria
                <input type="text" name="categoria" />
              </label>

              <label>
                Preço
                <input type="text" name="preco" placeholder="0,00" required />
              </label>
            </div>

            <details class="details details-sub">
              <summary>Preços por Tamanho (Opcional)</summary>
              <div class="two-cols">
                <label>
                  Preço P
                  <input type="text" name="preco_p" placeholder="0,00" />
                </label>
                <label>
                  Preço M
                  <input type="text" name="preco_m" placeholder="0,00" />
                </label>
              </div>
              <label>
                Preço G
                <input type="text" name="preco_g" placeholder="0,00" />
              </label>
            </details>

            <label>
              Descrição
              <textarea name="descricao" rows="3"></textarea>
            </label>

            <label>
              Imagem do produto (arquivo)
              <input type="file" name="imagem_file" accept="image/*" />
            </label>

            <label>
              Imagem do produto (URL opcional)
              <input type="url" name="imagem_url" placeholder="https://..." />
            </label>

            <label>
              Estoque Diário (Limite por dia)
              <input type="number" name="estoque_diario" placeholder="Ex: 50" />
            </label>

            <div class="field">
              <label>Acompanhamentos / Personalização</label>
              <div id="product-options-container" class="stack-gap" style="margin-top: 8px;"></div>
              
              <div class="presets-container">
                <button type="button" class="btn btn-marmita-template" id="add-marmita-template-btn">🍽️ Montar Marmita Completa</button>
                <button type="button" class="btn btn-preset" data-preset-group="Arroz">+ Arroz</button>
                <button type="button" class="btn btn-preset" data-preset-group="Feijão">+ Feijão</button>
                <button type="button" class="btn btn-preset" data-preset-group="Mistura">+ Mistura</button>
                <button type="button" class="btn btn-preset" data-preset-group="Acompanhamentos">+ Acomp.</button>
                <button type="button" class="btn btn-ghost" id="add-option-group-btn">+ Em Branco</button>
              </div>
              
              <input type="hidden" name="opcoes_json" />
            </div>

            <div class="topbar-actions">
              <button type="submit" class="btn btn-primary btn-lg">Salvar produto</button>
              <button type="button" class="btn" id="owner-produto-cancel">Cancelar edição</button>
            </div>
          </form>
        </details>

        <p id="owner-message" class="message" aria-live="polite"></p>
        <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
      </section>
    </main>

    <script type="module" src="/admin/script.js?v=37"></script>
  </body>
</html>
